version: 2

# This fork ships tree-sitter grammars (smacker/go-tree-sitter), which are C
# libraries — so every build needs CGO_ENABLED=1 and a matching C toolchain.
# Cross-compiling CGO is done via the goreleaser-cross image, which bundles the
# per-target compilers referenced in builds[].overrides below. See
# .github/workflows/release.yml.

before:
  hooks:
    - go mod download

builds:
  - id: grepai
    main: ./cmd/grepai
    binary: grepai
    env:
      - CGO_ENABLED=1
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CC=x86_64-linux-gnu-gcc
      - goos: linux
        goarch: arm64
        env:
          - CC=aarch64-linux-gnu-gcc
      - goos: darwin
        goarch: amd64
        env:
          - CC=o64-clang
      - goos: darwin
        goarch: arm64
        env:
          - CC=oa64-clang

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
  groups:
    - title: "New Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "Other Changes"
      order: 999

release:
  github:
    owner: kryptt
    name: grepai
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## grepai {{ .Version }}

    Semantic code search CLI (kryptt fork — tree-sitter symbol extraction for
    24 languages).
  footer: |
    ---

    **Full Changelog**: https://github.com/kryptt/grepai/compare/{{ .PreviousTag }}...{{ .Tag }}
