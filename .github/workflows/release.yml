name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # The fork's tree-sitter grammars are CGO. Cross-compiling CGO for
      # linux/darwin × amd64/arm64 needs the per-target C toolchains bundled in
      # the goreleaser-cross image (osxcross for darwin, aarch64 cross-gcc for
      # arm64). The image's Go version must track go.mod (go 1.24.x).
      - name: Run GoReleaser (CGO cross)
        run: |
          docker run --rm \
            -v "$PWD":/src \
            -w /src \
            -e GITHUB_TOKEN \
            ghcr.io/goreleaser/goreleaser-cross:v1.24.2 \
            release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
